<div id="introHTML" [innerHTML]="getIntroHTML()"></div>
@if (datasetOptionsList() === undefined) {
  <h5>Loading your dataset(s)...</h5>
  <p-progress-spinner ariaLabel="loading" />
} @else {
  <div style="margin: 2em;">
     <div style="margin: 1em">
    <h4>Select Draft Dataset</h4>
    </div>
    <div style="margin: 1em">
    <p-select
      [options]="datasetOptionsList()"
      [(ngModel)]="selectedDataset"
      [loading]="!datasetOptionsList()"
      optionLabel="optionLabel"
      placeholder="Select a dataset..."
    >
    </p-select>
    </div>
    <div style="margin: 1em">
      <p-button severity="info" label="Check my dataset >>" (click)="onClickNext()"></p-button>
    </div>
  </div>
}
